name: ci

on: [push, pull_request]

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The API tests import fastapi and the transport tests import
      # websocket-client, so the test job needs those extras — not just [dev].
      - run: pip install -e ".[dev,server,live]"
      - run: pytest -q
      # The harness gates itself — through its own published Action, so the
      # thing we tell strangers to use is the thing that protects this repo.
      # On pull requests the Action also comments the reliability delta.
      - uses: ./
        with:
          persona: personas/appointment_booking.yaml
          baseline: baselines/appointment_booking.json
      - uses: ./
        with:
          persona: personas/impatient_refund.yaml
          baseline: baselines/impatient_refund.json
